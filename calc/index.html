<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>かんたん計算機</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 40px auto;
      padding: 16px;
      line-height: 1.6;
    }
    h1 {
      font-size: 24px;
    }
    .box {
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 16px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
      box-sizing: border-box;
    }
    #result {
      margin-top: 12px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>かんたん計算機</h1>

  <div class="box">
    <input type="number" id="num1" placeholder="1つ目の数字" />
    
    <select id="operator">
      <option value="+">足し算 (+)</option>
      <option value="-">引き算 (-)</option>
      <option value="*">掛け算 (×)</option>
      <option value="/">割り算 (÷)</option>
    </select>

    <input type="number" id="num2" placeholder="2つ目の数字" />
    
    <button onclick="calculate()">計算する</button>

    <div id="result">結果: </div>
  </div>

  <script>
    function calculate() {
      const num1 = parseFloat(document.getElementById("num1").value);
      const num2 = parseFloat(document.getElementById("num2").value);
      const operator = document.getElementById("operator").value;
      const resultEl = document.getElementById("result");

      if (isNaN(num1) || isNaN(num2)) {
        resultEl.textContent = "結果: 数字を入力してください";
        return;
      }

      let result;

      if (operator === "+") {
        result = num1 + num2;
      } else if (operator === "-") {
        result = num1 - num2;
      } else if (operator === "*") {
        result = num1 * num2;
      } else if (operator === "/") {
        if (num2 === 0) {
          resultEl.textContent = "結果: 0では割れません";
          return;
        }
        result = num1 / num2;
      }

      resultEl.textContent = "結果: " + result;
    }
  </script>
</body>
</html>
